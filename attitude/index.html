<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#06100d"><title>Attitude Portal — 3-Axis</title>
<style>
:root{color-scheme:dark;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#06100d}body{overscroll-behavior:none}#view{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.top{position:fixed;z-index:2;top:0;left:0;right:0;padding:max(17px,env(safe-area-inset-top)) 16px 0;pointer-events:none}.brand{display:flex;justify-content:space-between;color:#bcffdf;letter-spacing:.14em;font-size:10px}.brand strong{color:#68ffb0;font-size:14px}.live{display:flex;gap:7px;align-items:center}.dot{width:7px;height:7px;border-radius:50%;background:#ffba4a;box-shadow:0 0 12px #ffba4a}.live.on .dot{background:#42ff9b;box-shadow:0 0 12px #42ff9b}.panel{position:fixed;z-index:3;left:10px;right:10px;bottom:max(10px,env(safe-area-inset-bottom));padding:11px;border:1px solid rgba(94,255,173,.27);border-radius:17px;background:rgba(4,17,14,.84);backdrop-filter:blur(18px);box-shadow:0 12px 45px #0007}.values{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.value{min-width:0;padding:8px;border-radius:11px;background:#6dffb612;border:1px solid #6dffb61f}.label{color:#79ab94;font-size:8px;letter-spacing:.08em}.number{margin-top:3px;color:#d9ffeb;font-size:clamp(17px,5.5vw,25px);font-variant-numeric:tabular-nums;white-space:nowrap}.number small{font-size:9px}.value:nth-child(1) .label,.value:nth-child(1) .number,.value:nth-child(1) small{color:#ff667d}.value:nth-child(2) .label,.value:nth-child(2) .number,.value:nth-child(2) small{color:#66aaff}.value:nth-child(3) .label,.value:nth-child(3) .number,.value:nth-child(3) small{color:#ffd45a}.graph-wrap{height:68px;margin:8px 0 9px;border-radius:10px;overflow:hidden;background:#020a08;border:1px solid #6dffb61a}.graph-wrap canvas{width:100%;height:100%}.controls{display:none}.panel.open .controls{display:block}.map{display:grid;grid-template-columns:30px repeat(3,1fr) 42px 48px;gap:5px;align-items:center;margin:7px 0}.axis{font-size:1 </style></head>
<body><canvas id="view"></canvas><div class="top"><div class="brand"><strong>ATTITUDE / PORTAL</strong><span class="live" id="live"><i class="dot"></i><span id="status">DEMO</span></span></div></div>
<section class="panel" id="panel"><div class="values"><div class="value"><div class="label">ALPHA / 方位</div><div class="number"><span id="alpha">000.0</span><small>°</small></div></div><div class="value"><div class="label">BETA / 前後</div><div class="number"><span id="beta">+00.0</span><small>°</small></div></div><div class="value"><div class="label">GAMMA / 左右</div><div class="number"><span id="gamma">+00.0</span><small>°</small></div></div></div>
<div class="graph-wrap"><canvas id="graph"></canvas></div><div class="controls"><div class="label">表示軸 ← センサー軸（各行で選択）</div><div id="maps"></div><label class="sensitivity">感度 <input id="gain" type="range" min="10" max="100" value="35"><span id="gainValue">0.35×</span></label></div><div class="buttons"><button id="start">センサーを開始</button><button class="mode" id="mode" aria-label="姿勢計算モード切替">MODE A</button><button class="reset" id="reset" aria-label="面を画面に揃える">RESET</button><button class="toggle" id="toggle" aria-label="設定を開く">軸</button></div><div class="hint" id="hint">PCでは画面をドラッグして確認できます</div></section>
<script>
(()=>{const cvs=document.querySelector('#view'),ctx=cvs.getContext('2d'),gc=document.querySelector('#graph').getContext('2d'),panel=document.querySelector('#panel'),start=document.querySelector('#start'),status=document.querySelector('#status'),live=document.querySelector('#live'),hint=document.querySelector('#hint'),gain=document.querySelector('#gain'),gainValue=document.querySelector('#gainValue'),outs=['alpha','beta','gamma'].map(x=>document.querySelector('#'+x));let W,H,D,GW,GH,sensor=false,drag=false,last={},raw={a:0,b:0,g:0},zero={a:0,b:0,g:0},demo={a:0,b:12,g:-14},rot={x:0,y:0,z:0},history=[[],[],[]],lastSample=0,mode=0,qPose={w:1,x:0,y:0,z:0},qBase={w:1,x:0,y:0,z:0};const map={x:'b',y:'g',z:'a'},inv={x:1,y:-1,z:1},enabled={x:true,y:true,z:false},names={a:'α',b:'β',g:'γ'},clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rad=d=>d*Math.PI/180;
const qMul=(a,b)=>({w:a.w*b.w-a.x*b.x-a.y*b.y-a.z*b.z,x:a.w*b.x+a.x*b.w+a.y*b.z-a.z*b.y,y:a.w*b.y-a.x*b.z+a.y*b.w+a.z*b.x,z:a.w*b.z+a.x*b.y-a.y*b.x+a.z*b.w}),qInv=q=>({w:q.w,x:-q.x,y:-q.y,z:-q.z}),qNorm=q=>{const n=Math.hypot(q.w,q.x,q.y,q.z)||1;return{w:q.w/n,x:q.x/n,y:q.y/n,z:q.z/n}},qAxis=(x,y,z,a)=>({w:Math.cos(a/2),x:x*Math.sin(a/2),y:y*Math.sin(a/2),z:z*Math.sin(a/2)}),qSensor=o=>qNorm(qMul(qMul(qAxis(0,0,1,rad(o.a)),qAxis(1,0,0,rad(o.b))),qAxis(0,1,0,rad(o.g)))),qLerp=(a,b,t)=>{let d=a.w*b.w+a.x*b.x+a.y*b.y+a.z*b.z;if(d<0)b={w:-b.w,x:-b.x,y:-b.y,z:-b.z};return qNorm({w:a.w+(b.w-a.w)*t,x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t,z:a.z+(b.z-a.z)*t})},qVector=q=>{q=qNorm(q);if(q.w<0)q={w:-q.w,x:-q.x,y:-q.y,z:-q.z};const a=2*Math.acos(clamp(q.w,-1,1)),sn=Math.sqrt(Math.max(0,1-q.w*q.w));return sn<1e-5?{x:0,y:0,z:0}:{x:q.x/sn*a,y:q.y/sn*a,z:q.z/sn*a}},qFromVector=v=>{const a=Math.hypot(v.x,v.y,v.z);return a<1e-6?{w:1,x:0,y:0,z:0}:qAxis(v.x/a,v.y/a,v.z/a,a)},qRotate=(q,p)=>{const u={w:0,x:p.x,y:p.y,z:p.z},r=qMul(qMul(q,u),qInv(q));return{x:r.x,y:r.y,z:r.z}};
function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cvs.width=W*D;cvs.height=H*D;ctx.setTransform(D,0,0,D,0,0);const r=document.querySelector('#graph').getBoundingClientRect();GW=r.width;GH=r.height;gc.canvas.width=GW*D;gc.canvas.height=GH*D;gc.setTransform(D,0,0,D,0,0)}addEventListener('resize',resize);resize();
function makeMaps(){const host=document.querySelector('#maps');['x','y','z'].forEach(axis=>{const row=document.createElement('div');row.className='map';row.innerHTML='<span class="axis">'+axis.toUpperCase()+'</span>'+['a','b','g'].map(s=>'<button class="choice '+(map[axis]===s?'selected':'')+'" data-axis="'+axis+'" data-s="'+s+'">'+names[s]+'</button>').join('')+'<button class="axis-off '+(!enabled[axis]?'on':'')+'" data-off="'+axis+'">OFF</button><button class="invert '+(inv[axis]<0?'on':'')+'" data-invert="'+axis+'">INV</button>';host.append(row)});host.addEventListener('click',e=>{const ob=e.target.closest('.axis-off');if(ob){const a=ob.dataset.off;enabled[a]=!enabled[a];ob.classList.toggle('on',!enabled[a]);return}const ib=e.target.closest('.invert');if(ib){const a=ib.dataset.invert;inv[a]*=-1;ib.classList.toggle('on',inv[a]<0);return}const b=e.target.closest('.choice');if(!b)return;map[b.dataset.axis]=b.dataset.s;host.querySelectorAll('[data-axis="'+b.dataset.axis+'"]').forEach(x=>x.classList.toggle('selected',x===b))})}makeMaps();gain.oninput=()=>gainValue.textContent=(gain.value/100).toFixed(2)+'×';document.querySelector('#toggle').onclick=e=>{const open=panel.classList.toggle('open');e.currentTarget.textContent=open?'閉じる':'軸';e.currentTarget.setAttribute('aria-label',open?'設定を閉じる':'設定を開く')};const calibrate=()=>{const src=sensor?raw:demo;zero={...src};qBase=qSensor(src);rot={x:0,y:0,z:0};qPose={w:1,x:0,y:0,z:0};hint.textContent='現在の面を画面に揃えました'};document.querySelector('#reset').onclick=calibrate;document.querySelector('#mode').onclick=e=>{mode=(mode+1)%3;e.currentTarget.textContent='MODE '+['A','B','C'][mode];e.currentTarget.classList.toggle('on',mode>0);calibrate();hint.textContent=['MODE A：3軸オイラー角','MODE B：相対姿勢で板を回転','MODE C：板を固定して奥を覗く'][mode]};
function orient(e){if(e.alpha==null)return;sensor=true;raw={a:e.alpha||0,b:e.beta||0,g:e.gamma||0};live.classList.add('on');status.textContent='LIVE';start.textContent='センサー動作中'}async function enable(){try{if(typeof DeviceOrientationEvent==='undefined')throw Error('姿勢センサーに対応していません');if(typeof DeviceOrientationEvent.requestPermission==='function'&&await DeviceOrientationEvent.requestPermission()!=='granted')throw Error('センサーが許可されませんでした');addEventListener('deviceorientation',orient,true);start.textContent='端末を傾けてください';hint.textContent='軸ボタンで対応を変更できます'}catch(e){status.textContent='OFF';hint.textContent=e.message+'。SafariをHTTPSで開いてください'}}start.onclick=enable;
cvs.onpointerdown=e=>{drag=true;last={x:e.clientX,y:e.clientY};cvs.setPointerCapture(e.pointerId)};cvs.onpointermove=e=>{if(!drag||sensor)return;demo.g=clamp(demo.g+(e.clientX-last.x)*.25,-80,80);demo.b=clamp(demo.b+(e.clientY-last.y)*.22,-80,80);last={x:e.clientX,y:e.clientY}};cvs.onpointerup=()=>drag=false;
function R(p,world=false){if(mode===1)return qRotate(qPose,p);if(mode===2)return world?qRotate(qInv(qPose),p):p;let{x,y,z}=p,c=Math.cos(rad(rot.x)),s=Math.sin(rad(rot.x));[y,z]=[y*c-z*s,y*s+z*c];c=Math.cos(rad(rot.y));s=Math.sin(rad(rot.y));[x,z]=[x*c+z*s,-x*s+z*c];c=Math.cos(rad(rot.z));s=Math.sin(rad(rot.z));[x,y]=[x*c-y*s,x*s+y*c];return{x,y,z}}function P(p,world=false){const q=R(p,world),f=Math.min(W,H)*1.25,d=620+q.z,s=f/Math.max(140,d);return{x:W/2+q.x*s,y:H*.39+q.y*s}}function path(ps,close=false,world=false){ctx.beginPath();ps.forEach((p,i)=>{p=P(p,world);i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});if(close)ctx.closePath()}
function graph(){gc.clearRect(0,0,GW,GH);gc.strokeStyle='#6dffb617';gc.lineWidth=1;for(let y=GH/4;y<GH;y+=GH/4){gc.beginPath();gc.moveTo(0,y);gc.lineTo(GW,y);gc.stroke()}['#ff667d','#66aaff','#ffd45a'].forEach((color,k)=>{const ar=history[k];if(ar.length<2)return;gc.beginPath();ar.forEach((v,i)=>{const x=i/(119)*GW,y=GH/2-clamp(v,-180,180)/180*(GH*.45);i?gc.lineTo(x,y):gc.moveTo(x,y)});gc.strokeStyle=color;gc.lineWidth=1.5;gc.stroke()})}
function draw(t){const src=sensor?raw:demo,g=+gain.value/100,wrap=a=>((a+180)%360+360)%360-180,relative={a:wrap(src.a-zero.a),b:wrap(src.b-zero.b),g:wrap(src.g-zero.g)},tar={x:enabled.x?relative[map.x]*g*inv.x:0,y:enabled.y?relative[map.y]*g*inv.y:0,z:enabled.z?relative[map.z]*g*inv.z:0};if(mode>0){let qr=qMul(qInv(qBase),qSensor(src)),v=qVector(qr);v={x:enabled.x?v.x*g*inv.x:0,y:enabled.y?v.y*g*inv.y:0,z:enabled.z?v.z*g*inv.z:0};qPose=qLerp(qPose,qFromVector(v),.11)}else{rot.x+=(tar.x-rot.x)*.11;rot.y+=(tar.y-rot.y)*.11;rot.z+=(tar.z-rot.z)*.11}outs[0].textContent=((raw.a%360+360)%360).toFixed(1).padStart(5,'0');outs[1].textContent=(raw.b>=0?'+':'')+raw.b.toFixed(1);outs[2].textContent=(raw.g>=0?'+':'')+raw.g.toFixed(1);if(t-lastSample>45){[raw.a,raw.b,raw.g].forEach((v,i)=>{history[i].push(v);if(history[i].length>120)history[i].shift()});lastSample=t;graph()}
const grd=ctx.createRadialGradient(W/2,H*.35,10,W/2,H*.4,Math.max(W,H)*.7);grd.addColorStop(0,'#12372c');grd.addColorStop(.5,'#081914');grd.addColorStop(1,'#030806');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);const size=Math.min(W*.76,H*.46,520),h=size/2;ctx.strokeStyle='#57ffa82a';ctx.lineWidth=1;for(let i=-4;i<=4;i++){let q=i*h/4;path([{x:q,y:-h,z:0},{x:q,y:h,z:0}]);ctx.stroke();path([{x:-h,y:q,z:0},{x:h,y:q,z:0}]);ctx.stroke()}path([{x:-h,y:-h,z:0},{x:h,y:-h,z:0},{x:h,y:h,z:0},{x:-h,y:h,z:0}],true);ctx.fillStyle='#1f7e5818';ctx.fill();ctx.strokeStyle='#5bffaec0';ctx.lineWidth=2;ctx.stroke();const axisLines=[['X','#ff667d',{x:-h,y:0,z:0},{x:h,y:0,z:0}],['Y','#66aaff',{x:0,y:-h,z:0},{x:0,y:h,z:0}],['Z','#ffd45a',{x:0,y:0,z:0},{x:0,y:0,z:h*.72}]];axisLines.forEach(a=>{path([a[2],a[3]]);ctx.strokeStyle=a[1];ctx.lineWidth=2;ctx.stroke();const q=P(a[3]);ctx.fillStyle=a[1];ctx.font='700 13px ui-monospace,monospace';ctx.fillText(a[0],q.x+5,q.y-5)});
const radius=size*.16,depth=300,seg=60,ring=z=>Array.from({length:seg+1},(_,i)=>({x:Math.cos(i/seg*Math.PI*2)*radius,y:Math.sin(i/seg*Math.PI*2)*radius,z})),rim=ring(-3),back=ring(depth);ctx.fillStyle='#0e4f3ab8';path([...rim,...back.slice().reverse()],true,true);ctx.fill();for(let i=0;i<seg;i+=6){path([rim[i],back[i]],false,true);ctx.strokeStyle='#58ffb52e';ctx.lineWidth=1;ctx.stroke()}path(back,true,true);ctx.fillStyle='#010d0a88';ctx.fill();ctx.strokeStyle='#59ffb18c';ctx.stroke();path(rim,true,true);ctx.fillStyle='#03100cf2';ctx.fill();ctx.strokeStyle='#65ffb0';ctx.lineWidth=3;ctx.shadowColor='#42ff9b';ctx.shadowBlur=14;ctx.stroke();ctx.shadowBlur=0;requestAnimationFrame(draw)}requestAnimationFrame(draw)})();
</script></body></html>
