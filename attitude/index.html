<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#07110f">
  <title>Attitude Portal</title>
  <style>
    :root { color-scheme: dark; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #07110f; }
    body { overscroll-behavior: none; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; touch-action: none; }
    .top { position: fixed; z-index: 2; top: 0; left: 0; right: 0; padding: max(18px, env(safe-area-inset-top)) 18px 0; pointer-events: none; }
    .brand { display: flex; justify-content: space-between; align-items: start; color: #bcffdf; letter-spacing: .14em; font-size: 11px; text-transform: uppercase; }
    .brand strong { color: #68ffb0; font-size: 15px; letter-spacing: .08em; }
    .live { display: flex; gap: 7px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #ffba4a; box-shadow: 0 0 12px #ffba4a; }
    .live.on .dot { background: #42ff9b; box-shadow: 0 0 12px #42ff9b; }
    .panel { position: fixed; z-index: 3; left: 14px; right: 14px; bottom: max(14px, env(safe-area-inset-bottom)); padding: 14px; border: 1px solid rgba(94,255,173,.27); border-radius: 18px; background: rgba(4,17,14,.75); backdrop-filter: blur(18px); box-shadow: 0 12px 45px rgba(0,0,0,.35); }
    .values { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .value { min-width: 0; padding: 10px; border-radius: 12px; background: rgba(109,255,182,.07); border: 1px solid rgba(109,255,182,.12); }
    .label { color: #79ab94; font-size: 9px; letter-spacing: .12em; }
    .number { margin-top: 4px; color: #d9ffeb; font-size: clamp(18px,6vw,28px); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .number small { color: #68ffb0; font-size: 10px; }
    button { width: 100%; min-height: 48px; border: 0; border-radius: 13px; background: #55f5a3; color: #062015; font: 700 13px/1 ui-monospace, monospace; letter-spacing: .06em; }
    button:active { transform: scale(.985); }
    .hint { margin: 9px 2px 0; color: #779587; font-size: 10px; line-height: 1.5; text-align: center; }
    @media (min-width: 720px) { .panel { width: 430px; left: 50%; right: auto; transform: translateX(-50%); } }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div class="top">
    <div class="brand"><strong>ATTITUDE / PORTAL</strong><span class="live" id="live"><i class="dot"></i><span id="status">DEMO</span></span></div>
  </div>
  <section class="panel">
    <div class="values">
      <div class="value"><div class="label">ALPHA / 方位</div><div class="number"><span id="alpha">0.0</span><small>°</small></div></div>
      <div class="value"><div class="label">BETA / 前後</div><div class="number"><span id="beta">0.0</span><small>°</small></div></div>
      <div class="value"><div class="label">GAMMA / 左右</div><div class="number"><span id="gamma">0.0</span><small>°</small></div></div>
    </div>
    <button id="start">センサーを開始</button>
    <div class="hint" id="hint">iPhoneではボタンを押して姿勢センサーを許可してください<br>PCではドラッグして動きを確認できます</div>
  </section>
  <script>
  (() => {
    const canvas = document.querySelector('#view'), ctx = canvas.getContext('2d');
    const out = ['alpha','beta','gamma'].map(id => document.querySelector('#'+id));
    const start = document.querySelector('#start'), live = document.querySelector('#live');
    const status = document.querySelector('#status'), hint = document.querySelector('#hint');
    let W=0,H=0,D=1, target={a:0,b:12,g:-16}, pose={...target}, sensor=false, dragging=false, last={x:0,y:0};
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), rad=d=>d*Math.PI/180;

    function resize(){ D=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight; canvas.width=W*D; canvas.height=H*D; ctx.setTransform(D,0,0,D,0,0); }
    addEventListener('resize',resize); resize();

    function orientation(e){
      if(e.alpha==null) return;
      sensor=true; target.a=e.alpha||0; target.b=e.beta||0; target.g=e.gamma||0;
      live.classList.add('on'); status.textContent='LIVE'; start.textContent='センサー動作中';
    }
    async function enable(){
      try {
        if(typeof DeviceOrientationEvent==='undefined') throw new Error('この端末は姿勢センサーに対応していません');
        if(typeof DeviceOrientationEvent.requestPermission==='function') {
          const result=await DeviceOrientationEvent.requestPermission();
          if(result!=='granted') throw new Error('センサーの使用が許可されませんでした');
        }
        addEventListener('deviceorientation',orientation,true);
        start.textContent='端末をゆっくり傾けてください'; hint.textContent='画面の向きに合わせて奥の空間が動きます';
      } catch(err) { status.textContent='OFF'; hint.textContent=err.message+'。SafariをHTTPSで開いて再度お試しください。'; }
    }
    start.addEventListener('click',enable);
    canvas.addEventListener('pointerdown',e=>{dragging=true;last={x:e.clientX,y:e.clientY};canvas.setPointerCapture(e.pointerId)});
    canvas.addEventListener('pointermove',e=>{if(!dragging||sensor)return;target.g=clamp(target.g+(e.clientX-last.x)*.32,-60,60);target.b=clamp(target.b+(e.clientY-last.y)*.25,-35,70);last={x:e.clientX,y:e.clientY}});
    canvas.addEventListener('pointerup',()=>dragging=false);

    function rotate(p){
      let {x,y,z}=p, cg=Math.cos(rad(-pose.g)),sg=Math.sin(rad(-pose.g)); [x,y]=[x*cg-y*sg,x*sg+y*cg];
      let cb=Math.cos(rad(pose.b-18)),sb=Math.sin(rad(pose.b-18)); [y,z]=[y*cb-z*sb,y*sb+z*cb];
      let ca=Math.cos(rad((pose.a||0)*.12)),sa=Math.sin(rad((pose.a||0)*.12)); [x,z]=[x*ca-z*sa,x*sa+z*ca];
      return {x,y,z};
    }
    function project(p){ const q=rotate(p), f=Math.min(W,H)*1.15, depth=520+q.z, s=f/Math.max(100,depth); return {x:W/2+q.x*s,y:H*.42+q.y*s,s,z:q.z}; }
    function path(points,close=false){ ctx.beginPath(); points.forEach((p,i)=>{p=project(p);i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});if(close)ctx.closePath(); }

    function draw(){
      pose.a+=(target.a-pose.a)*.07; pose.b+=(target.b-pose.b)*.07; pose.g+=(target.g-pose.g)*.07;
      out[0].textContent=((pose.a%360)+360)%360 < 10 ? '00'+(((pose.a%360)+360)%360).toFixed(1) : (((pose.a%360)+360)%360).toFixed(1);
      out[1].textContent=(pose.b>=0?'+':'')+pose.b.toFixed(1); out[2].textContent=(pose.g>=0?'+':'')+pose.g.toFixed(1);
      const grd=ctx.createRadialGradient(W/2,H*.38,10,W/2,H*.4,Math.max(W,H)*.7);grd.addColorStop(0,'#12372c');grd.addColorStop(.45,'#091b16');grd.addColorStop(1,'#030806');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
      const size=Math.min(W*.78,560), half=size/2, z=0;
      ctx.lineWidth=1; ctx.strokeStyle='rgba(87,255,168,.12)';
      for(let i=-4;i<=4;i++){let t=i*half/4;path([{x:t,y:-half,z},{x:t,y:half,z}]);ctx.stroke();path([{x:-half,y:t,z},{x:half,y:t,z}]);ctx.stroke();}
      path([{x:-half,y:-half,z},{x:half,y:-half,z},{x:half,y:half,z},{x:-half,y:half,z}],true);ctx.fillStyle='rgba(31,126,88,.10)';ctx.fill();ctx.strokeStyle='rgba(91,255,174,.75)';ctx.lineWidth=2;ctx.stroke();
      const R=size*.16, top=-170, bottom=260, seg=56;
      const ring=y=>Array.from({length:seg+1},(_,i)=>({x:Math.cos(i/seg*Math.PI*2)*R,y,z:Math.sin(i/seg*Math.PI*2)*R}));
      const back=ring(bottom), rim=ring(top);
      ctx.fillStyle='rgba(14,79,58,.72)';path([...rim,...back.slice().reverse()],true);ctx.fill();
      for(let i=0;i<seg;i+=7){path([rim[i],back[i]]);ctx.strokeStyle='rgba(88,255,181,.18)';ctx.lineWidth=1;ctx.stroke();}
      path(back,true);ctx.fillStyle='rgba(1,13,10,.6)';ctx.fill();ctx.strokeStyle='rgba(89,255,177,.55)';ctx.stroke();
      path(rim,true);ctx.fillStyle='rgba(3,16,12,.95)';ctx.fill();ctx.strokeStyle='#65ffb0';ctx.lineWidth=3;ctx.shadowColor='#42ff9b';ctx.shadowBlur=14;ctx.stroke();ctx.shadowBlur=0;
      const center=project({x:0,y:0,z:0});ctx.fillStyle='#8bffbf';ctx.beginPath();ctx.arc(center.x,center.y,3,0,7);ctx.fill();
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>
</body>
</html>
