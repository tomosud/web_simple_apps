<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>シュナウザー・アジリティ・フラップ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0d1117; overflow: hidden;
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; overscroll-behavior: none;
  }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0d1117; }
  #game { display: block; background: #0d1117; touch-action: none; }
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; color: #fff;
    background: rgba(8, 14, 24, 0.8); backdrop-filter: blur(2px); padding: 24px; z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 24px; margin-bottom: 6px; letter-spacing: 1px; }
  .overlay .sub { font-size: 13.5px; opacity: 0.9; line-height: 1.8; margin-bottom: 16px; max-width: 330px; }
  .overlay .sub b.g { color:#5dd66b; } .overlay .sub b.r { color:#ff6464; }
  .overlay .big { font-size: 46px; font-weight: 800; color: #ffd34d; margin: 4px 0; }
  .overlay .row { font-size: 15px; opacity: 0.9; margin: 2px 0; }
  .legend { display:flex; gap:14px; margin: 6px 0 4px; font-size:12.5px; }
  .legend span { display:flex; align-items:center; gap:5px; }
  .dot { width:12px; height:12px; border-radius:3px; display:inline-block; }
  .btn {
    margin-top: 16px; background: linear-gradient(180deg,#ffd34d,#ff9f1c);
    color: #3a2400; font-weight: 800; font-size: 18px; border: none; border-radius: 999px;
    padding: 14px 34px; box-shadow: 0 6px 0 #b86a00, 0 10px 18px rgba(0,0,0,.4); cursor: pointer;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b86a00, 0 5px 10px rgba(0,0,0,.4); }
  .hint { margin-top: 12px; font-size: 12px; opacity: 0.6; }
  .paw { font-size: 38px; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="startScreen" class="overlay">
    <div class="paw">🐶</div>
    <h1>シュナウザー・アジリティ・フラップ</h1>
    <div class="sub">
      <b>タップで上昇</b>、放置で<b>落下</b>（フラッピー操作）。<br>
      上の<b>先読みマップ</b>で地形を予測し、下の窮屈な画面で高さを合わせる。<br>
      <b class="g">緑＝触れてOK（地面で休める）</b>／<b class="r">赤＝ミス</b>
    </div>
    <div class="legend">
      <span><i class="dot" style="background:#e5413c"></i>ハードル＝飛び越す</span>
      <span><i class="dot" style="background:#e5413c"></i>タイヤ＝高さ維持</span>
      <span><i class="dot" style="background:#e5413c"></i>トンネル＝低空</span>
    </div>
    <div class="sub" style="margin:6px 0 0;opacity:.75;">3ミスでゲームオーバー。走った距離がスコア。</div>
    <button class="btn" id="startBtn">スタート</button>
    <div class="hint">タップ / クリック / スペースキー で羽ばたく</div>
  </div>

  <div id="overScreen" class="overlay hidden">
    <div class="paw">🏁</div>
    <h1>ゴール！</h1>
    <div class="row">走行距離</div>
    <div class="big" id="finalDist">0 m</div>
    <div class="row" id="finalBest">ベスト 0 m</div>
    <button class="btn" id="retryBtn">もう一度</button>
    <div class="hint">タップでリトライ</div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const startScreen = document.getElementById("startScreen");
  const overScreen  = document.getElementById("overScreen");

  // ---------- layout ----------
  let W=0, H=0, dpr=1;
  let mapTop, mapBottom, mapH;       // 上：先読み
  let playTop, playBottom, playH;    // 下：プレイ
  function resize() {
    const vw = Math.min(window.innerWidth, 520);
    W = vw; H = window.innerHeight;
    dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
    canvas.style.width = W+"px"; canvas.style.height = H+"px";
    canvas.width = Math.round(W*dpr); canvas.height = Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    mapTop = 0; mapH = Math.round(H*0.42); mapBottom = mapTop+mapH;
    playTop = mapBottom; playBottom = H; playH = playBottom-playTop;
  }
  window.addEventListener("resize", resize); resize();

  // ---------- constants ----------
  const FH = 200;            // field height (units)
  const FLOOR = FH;          // floor y
  const R = 22;              // dog collision radius (field units)
  const DOG_RX = 20;         // dog half-width (worldX px) for collision
  const GRAVITY = 820;
  const FLAP_V = -270;
  const MAX_FALL = 440;
  const BASE_SCROLL = 720;   // px/s (v1の約3倍)
  const PX_PER_METER = 30;
  const PREVIEW = 2600, PREVIEW_BACK = 200;
  const INV_TIME = 1.2;
  const LIVES = 3;

  // ---------- state ----------
  let state = "ready";   // ready|playing|over
  let scroll = 0, scrollSpeed = BASE_SCROLL;
  let dog = { y: FLOOR - R, vy: 0, flapAnim: 0 };
  let obstacles = [];
  let nextX = 0;
  let lives = LIVES, invTimer = 0, shake = 0;
  let best = +(localStorage.getItem("schnauzer_best2") || 0);
  let particles = [], clouds = [];
  let flash = { timer: 0, color: "#ff5d5d", text: "" };

  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function pick(weights){
    let tot=0; for(const k in weights) tot+=weights[k];
    let r=Math.random()*tot;
    for(const k in weights){ r-=weights[k]; if(r<=0) return k; }
    return Object.keys(weights)[0];
  }

  // ---------- course generation ----------
  function stageOf(m){
    if(m < 800) return {
      weights:{run:3,hurdle:3,tire:1,tunnel:1},
      gapMin:360, gapMax:560, restMin:260, restMax:420,
      barMin:50, barMax:80, tireMin:96, tireMax:108, tunMin:96, tunMax:112
    };
    if(m < 2000) return {
      weights:{run:1,hurdle:3,tire:2,tunnel:2},
      gapMin:300, gapMax:460, restMin:220, restMax:340,
      barMin:70, barMax:100, tireMin:82, tireMax:94, tunMin:86, tunMax:98
    };
    return {
      weights:{run:1,hurdle:3,tire:3,tunnel:3},
      gapMin:250, gapMax:380, restMin:170, restMax:270,
      barMin:85, barMax:115, tireMin:74, tireMax:86, tunMin:80, tunMax:90
    };
  }

  function makeObstacle(type, x, st){
    if(type==="hurdle"){
      const barH = rand(st.barMin, st.barMax);
      return { x, w:46, type, redLow: FLOOR-barH, redHigh:null };
    }
    if(type==="tunnel"){
      const clr = rand(st.tunMin, st.tunMax);   // 地面からの空き
      return { x, w:70, type, redLow:null, redHigh: FLOOR-clr };
    }
    // tire
    const gapH = rand(st.tireMin, st.tireMax);
    const cy = rand(gapH/2 + 22, FH - gapH/2 - 24);
    return { x, w:56, type:"tire", redLow: cy+gapH/2, redHigh: cy-gapH/2 };
  }

  function spawnAhead(){
    const limit = scroll + PREVIEW + 400;
    while(nextX < limit){
      const m = nextX / PX_PER_METER;
      const st = stageOf(m);
      const t = pick(st.weights);
      if(t==="run"){ nextX += rand(st.restMin, st.restMax); continue; }
      const ob = makeObstacle(t, nextX, st);
      obstacles.push(ob);
      nextX += ob.w + rand(st.gapMin, st.gapMax);
    }
  }

  // 指定worldXでの当たり障害物と安全帯
  function obstacleAt(wx){
    for(const o of obstacles){
      if(wx + DOG_RX >= o.x && wx - DOG_RX <= o.x + o.w) return o;
    }
    return null;
  }
  function safeBand(o){
    const top = o && o.redHigh!=null ? o.redHigh : 0;
    const bot = o && o.redLow!=null ? o.redLow : FLOOR;
    return { top, bot };
  }

  function reset(){
    scroll = 0; scrollSpeed = BASE_SCROLL;
    dog = { y: FLOOR - R, vy: 0, flapAnim: 0 };
    obstacles = []; nextX = 520;       // 最初は少し直線
    lives = LIVES; invTimer = 0; shake = 0;
    particles = []; flash = {timer:0,color:"#fff",text:""};
    clouds = [];
    for(let i=0;i<5;i++) clouds.push({x:rand(0,W), y:rand(playTop+10, playTop+playH*0.35), s:rand(0.6,1.2), spd:rand(10,26)});
    spawnAhead();
  }

  // ---------- input ----------
  function flap(){
    if(state==="ready"||state==="over"){ startGame(); return; }
    if(state!=="playing") return;
    dog.vy = FLAP_V;
    dog.flapAnim = 1;
    for(let i=0;i<3;i++) particles.push({x:scroll, y:dog.y+R*0.6, vx:rand(-30,-90), vy:rand(-20,40), t:0, life:rand(0.25,0.5), r:rand(2,4), col:"#ffffff", field:true});
    beep("flap");
  }

  // ---------- audio ----------
  let actx=null;
  function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); }
  function tone(f,t0,dur,type,vol){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain(); o.type=type||"sine"; o.frequency.setValueAtTime(f,t0); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol||0.16,t0+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); o.connect(g); g.connect(actx.destination); o.start(t0); o.stop(t0+dur+0.02); }
  function beep(k){ if(!actx) return; const t=actx.currentTime;
    if(k==="flap"){ tone(520,t,0.08,"triangle",0.12); tone(780,t+0.03,0.07,"triangle",0.08); }
    else if(k==="miss"){ tone(180,t,0.22,"sawtooth",0.18); tone(110,t+0.05,0.22,"sawtooth",0.14); }
    else if(k==="over"){ tone(330,t,0.18,"square",0.16); tone(247,t+0.14,0.2,"square",0.16); tone(165,t+0.3,0.3,"square",0.16); }
    else if(k==="go"){ tone(523,t,0.1,"triangle",0.16); tone(784,t+0.1,0.14,"triangle",0.16); }
  }

  // ---------- loop ----------
  let last=0;
  function loop(ts){ if(!last) last=ts; let dt=(ts-last)/1000; last=ts; if(dt>0.045) dt=0.045; if(state==="playing") update(dt); render(dt); requestAnimationFrame(loop); }

  function update(dt){
    const m = scroll/PX_PER_METER;
    scrollSpeed = BASE_SCROLL + Math.min(1, m/2500)*180;
    scroll += scrollSpeed*dt;
    spawnAhead();

    // 物理
    dog.vy = clamp(dog.vy + GRAVITY*dt, -9999, MAX_FALL);
    dog.y += dog.vy*dt;
    if(dog.y < R){ dog.y = R; if(dog.vy<0) dog.vy=0; }     // 天井
    if(dog.y > FLOOR - R){ dog.y = FLOOR - R; if(dog.vy>0) dog.vy=0; } // 床で休む
    if(dog.flapAnim>0) dog.flapAnim = Math.max(0, dog.flapAnim - dt*5);

    // 当たり判定
    if(invTimer>0){ invTimer -= dt; }
    else {
      const o = obstacleAt(scroll);
      if(o){
        const hitLow  = o.redLow!=null  && (dog.y + R > o.redLow);
        const hitHigh = o.redHigh!=null && (dog.y - R < o.redHigh);
        if(hitLow || hitHigh) doMiss(o);
      }
    }

    // 掃除
    if(obstacles.length>40 && obstacles[0].x + obstacles[0].w < scroll - 400) obstacles.shift();

    // 雲・パーティクル・演出
    for(const c of clouds){ c.x -= (c.spd + scrollSpeed*0.04)*dt; if(c.x<-60){ c.x=W+40; c.y=rand(playTop+10,playTop+playH*0.35);} }
    for(const p of particles){ p.t+=dt; if(!p.field) p.vy+=500*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
    particles = particles.filter(p=>p.t<p.life);
    if(shake>0) shake=Math.max(0, shake-dt*2.2);
    if(flash.timer>0) flash.timer-=dt;
  }

  function doMiss(o){
    lives--;
    invTimer = INV_TIME;
    shake = 1;
    flash = { timer:0.5, color:"#ff5d5d", text:"MISS" };
    // 赤の破片
    const sx = scroll;
    for(let i=0;i<14;i++) particles.push({x:sx, y:dog.y, vx:rand(-180,80), vy:rand(-160,160), t:0, life:rand(0.4,0.8), r:rand(2.5,5), col:"#ff5d5d", field:true});
    // 安全帯へスナップ復帰
    const b = safeBand(o);
    dog.y = clamp((b.top+b.bot)/2, b.top + R, Math.max(b.top+R, b.bot - R));
    dog.vy = 0;
    beep("miss");
    if(lives<=0){ beep("over"); gameOver(); }
  }

  // ---------- views ----------
  function bottomView(){
    const dogScreenX = W*0.30;
    const sx = 0.95;                 // 横ズーム（寄り＝視界狭い）
    const fieldTop = playTop + 4, fieldBot = playBottom;
    const sy = (fieldBot - fieldTop)/FH;
    return {
      sx, sy, dogScreenX,
      toX: wx => dogScreenX + (wx - scroll)*sx,
      toY: fy => fieldTop + fy*sy,
      left: 0, right: W, top: playTop, bottom: playBottom, fieldTop
    };
  }
  function topView(){
    const padL=10, padR=10;
    const span = W - padL - padR;
    const sx = span/(PREVIEW + PREVIEW_BACK);
    const fieldTop = mapTop + 26, fieldBot = mapBottom - 8;
    const sy = (fieldBot - fieldTop)/FH;
    return {
      sx, sy, padL,
      toX: wx => padL + (wx - (scroll - PREVIEW_BACK))*sx,
      toY: fy => fieldTop + fy*sy,
      left: padL, right: W-padR, top: mapTop, bottom: mapBottom, fieldTop, preview:true
    };
  }

  // ---------- render ----------
  function render(){
    ctx.save();
    if(shake>0){ ctx.translate((Math.random()-0.5)*8*shake, (Math.random()-0.5)*8*shake); }

    drawTopPreview(topView());
    drawPlay(bottomView());
    drawHUD();

    ctx.restore();
  }

  // 共通：地面＋障害物
  function drawGroundAndObstacles(v, light){
    const wxL = v.preview ? (scroll - PREVIEW_BACK) : (scroll - v.dogScreenX/v.sx);
    const wxR = v.preview ? (scroll + PREVIEW) : (scroll + (v.right - v.dogScreenX)/v.sx);
    // 地面（緑・安全）
    const gy = v.toY(FLOOR);
    ctx.fillStyle = light ? "#caa86a" : "#0f2e1c";
    ctx.fillRect(v.left, gy, v.right-v.left, v.bottom-gy);
    ctx.fillStyle = "#3fae4a";
    ctx.fillRect(v.left, gy, v.right-v.left, Math.max(3, 5*v.sy/2));
    if(light){
      // 走る縞
      ctx.strokeStyle="rgba(70,40,10,0.25)"; ctx.lineWidth=3;
      const step=70; const off=(scroll*v.sx)%step;
      ctx.beginPath();
      for(let x=v.left-off; x<=v.right; x+=step){ ctx.moveTo(x, gy+18); ctx.lineTo(x-14, gy+18); }
      ctx.stroke();
    }
    // 障害物
    for(const o of obstacles){
      if(o.x + o.w < wxL || o.x > wxR) continue;
      drawObstacle(o, v, light);
    }
  }

  function rrect(x,y,w,h,r){ r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function drawObstacle(o, v, light){
    const x = v.toX(o.x), w = o.w*v.sx;
    const red = "#e5413c", redD = "#b32f2b";
    // 下からの赤
    if(o.redLow!=null){
      const y0 = v.toY(o.redLow), y1 = v.toY(FLOOR);
      ctx.fillStyle = red; rrect(x, y0, w, y1-y0, Math.min(6, w*0.3)); ctx.fill();
      ctx.fillStyle = redD; ctx.fillRect(x, y0, w, Math.max(3, 4*v.sy/2));
      if(o.type==="hurdle" && light){ ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.fillRect(x, y0+ (y1-y0)*0.4, w, 3); }
    }
    // 上からの赤
    if(o.redHigh!=null){
      const y0 = v.toY(0), y1 = v.toY(o.redHigh);
      ctx.fillStyle = red; rrect(x, y0, w, y1-y0, Math.min(6, w*0.3)); ctx.fill();
      ctx.fillStyle = redD; ctx.fillRect(x, y1-Math.max(3,4*v.sy/2), w, Math.max(3,4*v.sy/2));
    }
    // タイヤらしさ：緑の通り穴の縁取り
    if(o.type==="tire"){
      const yt=v.toY(o.redHigh), yb=v.toY(o.redLow);
      ctx.strokeStyle="rgba(63,174,74,0.9)"; ctx.lineWidth=Math.max(2,3*v.sy/2);
      ctx.strokeRect(x+1, yt, w-2, yb-yt);
    }
  }

  function drawTopPreview(v){
    // 背景
    const g=ctx.createLinearGradient(0,mapTop,0,mapBottom); g.addColorStop(0,"#0f2236"); g.addColorStop(1,"#143049");
    ctx.fillStyle=g; ctx.fillRect(0,mapTop,W,mapH);
    ctx.fillStyle="rgba(255,255,255,0.12)"; ctx.fillRect(0,mapBottom-2,W,2);

    drawGroundAndObstacles(v, false);

    // 安全ルートのガイド線（緑点線）
    ctx.strokeStyle="rgba(120,230,140,0.55)"; ctx.lineWidth=2; ctx.setLineDash([4,6]);
    ctx.beginPath();
    let started=false;
    for(let wx=scroll-PREVIEW_BACK; wx<=scroll+PREVIEW; wx+=24){
      const o=obstacleAt(wx); const b=safeBand(o);
      const cy = o ? clamp((b.top+b.bot)/2, b.top+R, Math.max(b.top+R,b.bot-R)) : FLOOR-R;
      const X=v.toX(wx), Y=v.toY(cy);
      if(!started){ ctx.moveTo(X,Y); started=true; } else ctx.lineTo(X,Y);
    }
    ctx.stroke(); ctx.setLineDash([]);

    // NOW 縦線
    const nowX=v.toX(scroll);
    ctx.strokeStyle="rgba(255,211,77,0.85)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(nowX,mapTop+24); ctx.lineTo(nowX,mapBottom-4); ctx.stroke();
    // 犬ドット
    const dy=v.toY(dog.y);
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(nowX,dy,6,0,7); ctx.fill();
    ctx.fillStyle="#6f7378"; ctx.beginPath(); ctx.arc(nowX,dy,4,0,7); ctx.fill();

    // タイトル
    ctx.fillStyle="rgba(255,255,255,0.7)"; ctx.font="600 12px sans-serif"; ctx.textAlign="left";
    ctx.fillText("コース先読み（横から）▶", 10, mapTop+18);
  }

  function drawPlay(v){
    // 空
    const g=ctx.createLinearGradient(0,playTop,0,playBottom); g.addColorStop(0,"#bfe3ff"); g.addColorStop(1,"#e9f7ff");
    ctx.fillStyle=g; ctx.fillRect(0,playTop,W,playH);
    // 雲
    ctx.fillStyle="rgba(255,255,255,0.9)";
    for(const c of clouds){ const r=15*c.s; ctx.beginPath(); ctx.arc(c.x,c.y,r,0,7); ctx.arc(c.x+r,c.y+4,r*0.8,0,7); ctx.arc(c.x-r,c.y+5,r*0.7,0,7); ctx.fill(); }
    // スピードライン
    if(!false){ const a=0.14; ctx.strokeStyle=`rgba(255,255,255,${a})`; ctx.lineWidth=2;
      for(let i=0;i<7;i++){ const yy=playTop+playH*(0.12+0.11*i); const xx=(i*123+(scroll*3))%(W+140)-70; ctx.beginPath(); ctx.moveTo(xx,yy); ctx.lineTo(xx+46,yy); ctx.stroke(); } }

    drawGroundAndObstacles(v, true);

    // パーティクル（field座標のものはこのビューで描画）
    for(const p of particles){ if(!p.field) continue; const a=1-p.t/p.life; ctx.globalAlpha=Math.max(0,a); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(v.toX(p.x), v.toY(p.y), p.r,0,7); ctx.fill(); }
    ctx.globalAlpha=1;

    // 犬
    drawDog(v);

    // MISS 表示
    if(flash.timer>0 && flash.text){ const a=clamp(flash.timer/0.4,0,1); ctx.globalAlpha=a; ctx.fillStyle=flash.color; ctx.textAlign="center"; ctx.font="800 30px sans-serif"; ctx.fillText(flash.text, v.dogScreenX, v.toY(dog.y)-R*v.sy-14); ctx.globalAlpha=1; }

    // 判定ライン（犬の位置・薄く）
    ctx.strokeStyle="rgba(255,255,255,0.25)"; ctx.lineWidth=1; ctx.setLineDash([4,6]);
    ctx.beginPath(); ctx.moveTo(v.dogScreenX, playTop+4); ctx.lineTo(v.dogScreenX, playBottom); ctx.stroke(); ctx.setLineDash([]);
  }

  // ---------- ミニチュアシュナウザー ----------
  function drawDog(v){
    const cx = v.dogScreenX, cy = v.toY(dog.y);
    const scale = v.sy * 0.9;             // 犬を大きく（窮屈に・当たり判定に合わせる）
    const onGround = dog.y > FLOOR - R - 1 && (()=>{const o=obstacleAt(scroll); return !(o&&o.redLow!=null);})();
    const tilt = clamp(dog.vy*0.0016, -0.5, 0.7);
    const blink = invTimer>0 ? (Math.floor(invTimer*12)%2===0) : false;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(tilt);
    ctx.scale(scale, scale);
    if(blink) ctx.globalAlpha = 0.4;

    // 影（地面上）
    const groundOff = (FLOOR - R - dog.y);
    ctx.save(); ctx.scale(1,0.32); ctx.fillStyle="rgba(0,0,0,0.16)";
    ctx.beginPath(); ctx.ellipse(0, (40 + groundOff*1.2), 40, 16, 0,0,7); ctx.fill(); ctx.restore();

    const grayD="#6f7378", grayL="#aeb2b6", beard="#dde0e3";
    const bodyW=64, bodyH=30;
    const run = onGround ? Math.sin(scroll*0.04) : 0.3;
    const air = onGround ? 0 : 1;

    // 後脚
    ctx.strokeStyle=grayD; ctx.lineWidth=7; ctx.lineCap="round";
    leg(16, 14, air? -6 : run*9);
    leg(8, 14, air? -3 : -run*9);
    // 尾
    ctx.fillStyle=grayD; ctx.save(); ctx.translate(-30,-18); ctx.rotate(-0.5); ctx.fillRect(-3,-10,6,14); ctx.restore();
    // 胴
    ctx.fillStyle=grayL; rrect(-32,-bodyH,bodyW,bodyH,12); ctx.fill();
    ctx.fillStyle=grayD; rrect(-32,-bodyH,bodyW,bodyH*0.5,12); ctx.fill();
    // 前脚
    ctx.strokeStyle=grayD; ctx.lineWidth=7;
    leg(-18,14, air? 7 : -run*9);
    leg(-26,14, air? 4 : run*9);
    // 頭
    ctx.fillStyle=grayL; rrect(20,-bodyH-8,30,30,10); ctx.fill();
    // 耳
    ctx.fillStyle=grayD; ctx.beginPath(); ctx.moveTo(24,-bodyH-8); ctx.lineTo(30,-bodyH-18); ctx.lineTo(36,-bodyH-6); ctx.closePath(); ctx.fill();
    // マズル＋ヒゲ
    ctx.fillStyle=beard; ctx.beginPath(); ctx.moveTo(44,-bodyH-4); ctx.lineTo(60,-bodyH+2); ctx.lineTo(58,-bodyH+14); ctx.lineTo(44,-bodyH+12); ctx.closePath(); ctx.fill();
    // 鼻
    ctx.fillStyle="#23262a"; ctx.beginPath(); ctx.arc(59,-bodyH+3,4,0,7); ctx.fill();
    // 眉
    ctx.fillStyle=beard; ctx.beginPath(); ctx.ellipse(40,-bodyH-4,7,4,-0.3,0,7); ctx.fill();
    // 目
    ctx.fillStyle="#1a1c1f"; ctx.beginPath(); ctx.arc(42,-bodyH+2,2.6,0,7); ctx.fill();

    ctx.restore();

    function leg(lx,len,sw){ ctx.beginPath(); ctx.moveTo(lx,-2); ctx.lineTo(lx+sw,len); ctx.stroke(); }
  }

  // ---------- HUD ----------
  function drawHUD(){
    const distM = Math.floor(scroll/PX_PER_METER);
    ctx.textAlign="left"; ctx.fillStyle="#0d2233"; ctx.font="800 20px sans-serif";
    ctx.fillText(distM+" m", 12, mapBottom+26);
    // ライフ（肉球ドット）
    ctx.textAlign="right";
    for(let i=0;i<LIVES;i++){
      const x=W-16-i*24, y=mapBottom+20;
      ctx.fillStyle = i<lives ? "#ff5d5d" : "rgba(13,34,51,0.18)";
      ctx.beginPath(); ctx.arc(x,y,8,0,7); ctx.fill();
    }
    ctx.fillStyle="rgba(13,34,51,0.6)"; ctx.font="600 10px sans-serif"; ctx.textAlign="right";
    ctx.fillText("LIVES", W-16, mapBottom+40);
  }

  // ---------- flow ----------
  function startGame(){ ensureAudio(); beep("go"); reset(); state="playing"; startScreen.classList.add("hidden"); overScreen.classList.add("hidden"); }
  function gameOver(){
    state="over";
    const distM=Math.floor(scroll/PX_PER_METER);
    if(distM>best){ best=distM; localStorage.setItem("schnauzer_best2", best); }
    document.getElementById("finalDist").textContent = distM+" m";
    document.getElementById("finalBest").textContent = "ベスト "+best+" m";
    overScreen.classList.remove("hidden");
  }

  // ---------- events ----------
  function onDown(e){ e.preventDefault(); ensureAudio(); flap(); }
  canvas.addEventListener("pointerdown", onDown, {passive:false});
  document.getElementById("startBtn").addEventListener("pointerdown", e=>{ e.preventDefault(); startGame(); });
  document.getElementById("retryBtn").addEventListener("pointerdown", e=>{ e.preventDefault(); startGame(); });
  window.addEventListener("keydown", e=>{ if(e.code==="Space"||e.code==="Enter"){ e.preventDefault(); ensureAudio(); flap(); } });

  reset(); state="ready"; requestAnimationFrame(loop);
})();
</script>
</body>
</html>
