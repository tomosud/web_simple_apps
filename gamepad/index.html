<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バウンスゲーム</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; }
  #ui-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; display: flex; flex-direction: column; align-items: center;
  }
  #hud {
    color: #fff; font-size: 20px; padding: 10px 20px;
    background: rgba(0,0,0,0.5); border-radius: 0 0 8px 8px;
  }
  #message {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #0f0; font-size: 48px; font-weight: bold; text-shadow: 0 0 20px #0f0;
    display: none;
  }
  #gamepad-prompt {
    position: absolute; bottom: 30px;
    color: #aaa; font-size: 16px;
  }
</style>
</head>
<body>

<div id="ui-overlay">
  <div id="hud">SCORE: <span id="score">0</span> | 残り: <span id="enemy-count">0</span> | Jump: <span id="combo-count">0</span> | Speed: <span id="speed-display">x1.0</span></div>
  <div id="message"></div>
  <div id="gamepad-prompt">ゲームパッドを接続してボタンを押してください（キーボード: 矢印キー + スペース / Shift=ダッシュ）</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
// 定数
// ============================================================
const FIELD_W = 800;
const FIELD_H = 600;
const WALL_THICKNESS = 10;
const PLAYER_RADIUS = 15;
const ENEMY_RADIUS = 6;
const ENEMY_COUNT = 30;
const GRAVITY = -980;
const JUMP_VELOCITY = 450;
const MOVE_SPEED = 300;
const DASH_SPEED = 550;
const DASH_JUMP_BONUS = 180;
const COMBO_WINDOW = 0.35;
const COMBO_BONUS = 80;
const MAX_COMBO = 5;
const BOUNCE_DAMPING = 0.7;
const WALL_SPEED_PENALTY = 0.15;
const MIN_BOUNCE_VEL = 60;
const ENEMY_SPEED_MIN = 40;
const ENEMY_SPEED_MAX = 120;
const SCORE_PER_ENEMY = 100;

// 速度ブースト
const SPEED_BOOST_PER_KILL = 0.25;
const SPEED_DECAY_RATE = 0.3;
const MAX_SPEED_MULT = 4.0;
const AIRBORNE_ACCEL = 0.4;
const KNOCKBACK_SPEED = 250;
const RELATIVE_SPEED_KILL = 200;
const GRAVITY_PULL = 60;
const GRAVITY_PULL_RANGE = 150;
const ENEMY_WALL_BOUNCE = 50;
const ENEMY_TRAIL_LENGTH = 5;

// 軌跡
const TRAIL_BASE_LENGTH = 15;
const TRAIL_LENGTH_PER_SPEED = 25;
const TRAIL_RECORD_INTERVAL = 0.012;
const TRAIL_BASE_WIDTH = 3;

// 破片
const FRAGMENT_COUNT = 3;
const FRAGMENT_RADIUS = 3;
const FRAGMENT_SPEED = 350;

// 消滅パーティクル
const PARTICLE_COUNT = 6;
const PARTICLE_LIFE = 0.4;

// ============================================================
// Three.js セットアップ
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(FIELD_W, FIELD_H);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.OrthographicCamera(
  -FIELD_W / 2, FIELD_W / 2,
  FIELD_H / 2, -FIELD_H / 2,
  0.1, 100
);
camera.position.z = 10;

// ============================================================
// 壁
// ============================================================
const wallMaterial = new THREE.MeshBasicMaterial({ color: 0x4488cc });

function createWall(x, y, w, h) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mesh = new THREE.Mesh(geo, wallMaterial);
  mesh.position.set(x, y, 0);
  scene.add(mesh);
}

const hw = FIELD_W / 2;
const hh = FIELD_H / 2;
createWall(0, hh - WALL_THICKNESS / 2, FIELD_W, WALL_THICKNESS);
createWall(0, -hh + WALL_THICKNESS / 2, FIELD_W, WALL_THICKNESS);
createWall(-hw + WALL_THICKNESS / 2, 0, WALL_THICKNESS, FIELD_H);
createWall(hw - WALL_THICKNESS / 2, 0, WALL_THICKNESS, FIELD_H);

const innerLeft   = -hw + WALL_THICKNESS + PLAYER_RADIUS;
const innerRight  =  hw - WALL_THICKNESS - PLAYER_RADIUS;
const innerBottom = -hh + WALL_THICKNESS + PLAYER_RADIUS;
const innerTop    =  hh - WALL_THICKNESS - PLAYER_RADIUS;

// ============================================================
// プレイヤー
// ============================================================
const playerGeo = new THREE.CircleGeometry(PLAYER_RADIUS, 32);
const playerMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
const player = new THREE.Mesh(playerGeo, playerMat);
player.position.set(0, 0, 1);
scene.add(player);

let vx = 0;
let vy = 0;
let onGround = false;
let combo = 0;
let lastLandTime = -999;
let isDashing = false;
let score = 0;
let speedMult = 1.0;

// ============================================================
// 敵
// ============================================================
const enemyGeo = new THREE.CircleGeometry(ENEMY_RADIUS, 16);
const enemies = [];
const enemyData = [];

const eInnerLeft   = -hw + WALL_THICKNESS + ENEMY_RADIUS;
const eInnerRight  =  hw - WALL_THICKNESS - ENEMY_RADIUS;
const eInnerBottom = -hh + WALL_THICKNESS + ENEMY_RADIUS;
const eInnerTop    =  hh - WALL_THICKNESS - ENEMY_RADIUS;

function spawnEnemies() {
  for (let i = 0; i < ENEMY_COUNT; i++) {
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(Math.random(), 0.8, 0.6)
    });
    const mesh = new THREE.Mesh(enemyGeo, mat);
    const ex = eInnerLeft + Math.random() * (eInnerRight - eInnerLeft);
    const ey = eInnerBottom + Math.random() * (eInnerTop - eInnerBottom);
    mesh.position.set(ex, ey, 1);
    scene.add(mesh);
    enemies.push(mesh);
    const angle = Math.random() * Math.PI * 2;
    const speed = ENEMY_SPEED_MIN + Math.random() * (ENEMY_SPEED_MAX - ENEMY_SPEED_MIN);

    // 軌跡用 Line を事前作成（毎フレーム座標更新のみ）
    const trailPosArr = new Float32Array(ENEMY_TRAIL_LENGTH * 3);
    const trailGeo = new THREE.BufferGeometry();
    const trailPosAttrE = new THREE.Float32BufferAttribute(trailPosArr, 3);
    trailPosAttrE.setUsage(THREE.DynamicDrawUsage);
    trailGeo.setAttribute('position', trailPosAttrE);
    trailGeo.setDrawRange(0, 0);
    const trailMat = new THREE.LineBasicMaterial({ color: mat.color.clone(), transparent: true, opacity: 0.4 });
    const trailLine = new THREE.Line(trailGeo, trailMat);
    trailLine.frustumCulled = false;
    scene.add(trailLine);

    enemyData.push({
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      trail: [],
      trailLine,
      trailPosAttr: trailPosAttrE
    });
  }
  updateHud();
}

// ============================================================
// プレイヤー軌跡（滑らかな尻尾）— 事前確保バッファで高速更新
// ============================================================
const trailHistory = [];
let trailTimer = 0;

function getTrailMaxLen() {
  return Math.floor(TRAIL_BASE_LENGTH + TRAIL_LENGTH_PER_SPEED * (speedMult - 1));
}

// 最大頂点数を事前計算して確保
const TRAIL_MAX_POINTS = Math.floor(TRAIL_BASE_LENGTH + TRAIL_LENGTH_PER_SPEED * (MAX_SPEED_MULT - 1));
const TRAIL_MAX_DIVISIONS = TRAIL_MAX_POINTS * 3;
const TRAIL_MAX_VERTS = TRAIL_MAX_DIVISIONS * 2;

const trailGeo = new THREE.BufferGeometry();
const trailPosAttr = new THREE.Float32BufferAttribute(new Float32Array(TRAIL_MAX_VERTS * 3), 3);
const trailColAttr = new THREE.Float32BufferAttribute(new Float32Array(TRAIL_MAX_VERTS * 4), 4);
trailPosAttr.setUsage(THREE.DynamicDrawUsage);
trailColAttr.setUsage(THREE.DynamicDrawUsage);
trailGeo.setAttribute('position', trailPosAttr);
trailGeo.setAttribute('color', trailColAttr);
// インデックスも最大サイズで確保
const trailMaxIndices = (TRAIL_MAX_VERTS - 2) * 3;
const trailIndexArr = new Uint16Array(trailMaxIndices);
for (let i = 0, idx = 0; i < TRAIL_MAX_VERTS - 2; i += 2) {
  trailIndexArr[idx++] = i; trailIndexArr[idx++] = i + 1; trailIndexArr[idx++] = i + 2;
  trailIndexArr[idx++] = i + 1; trailIndexArr[idx++] = i + 3; trailIndexArr[idx++] = i + 2;
}
trailGeo.setIndex(new THREE.BufferAttribute(trailIndexArr, 1));
trailGeo.setDrawRange(0, 0);

const trailMat = new THREE.MeshBasicMaterial({
  vertexColors: true, transparent: true, side: THREE.DoubleSide, depthWrite: false
});
const trailMesh = new THREE.Mesh(trailGeo, trailMat);
trailMesh.frustumCulled = false;
scene.add(trailMesh);

const _trailBaseColor = new THREE.Color(0x00ff88);
const _trailTipColor  = new THREE.Color(0x004422);
const _trailTmpColor  = new THREE.Color();
const _trailVec3Arr = [];  // 再利用用

function buildTrailMesh() {
  const len = trailHistory.length;
  if (len < 2) { trailGeo.setDrawRange(0, 0); return; }

  // CatmullRomで滑らかな曲線を作成
  _trailVec3Arr.length = 0;
  for (let i = 0; i < len; i++) {
    const p = trailHistory[i];
    _trailVec3Arr.push(new THREE.Vector3(p.x, p.y, 0));
  }
  const curve = new THREE.CatmullRomCurve3(_trailVec3Arr, false, 'catmullrom', 0.5);
  const divisions = Math.max(len * 3, 20);
  const smoothPoints = curve.getPoints(divisions);
  const smoothLen = smoothPoints.length;

  const posArr = trailPosAttr.array;
  const colArr = trailColAttr.array;

  for (let i = 0; i < smoothLen; i++) {
    const t = i / (smoothLen - 1);
    const width = TRAIL_BASE_WIDTH * t * speedMult * 0.7;

    let nx = 0, ny = 1;
    if (i < smoothLen - 1) {
      const dx = smoothPoints[i + 1].x - smoothPoints[i].x;
      const dy = smoothPoints[i + 1].y - smoothPoints[i].y;
      const l = Math.sqrt(dx * dx + dy * dy) || 1;
      nx = -dy / l; ny = dx / l;
    } else if (i > 0) {
      const dx = smoothPoints[i].x - smoothPoints[i - 1].x;
      const dy = smoothPoints[i].y - smoothPoints[i - 1].y;
      const l = Math.sqrt(dx * dx + dy * dy) || 1;
      nx = -dy / l; ny = dx / l;
    }

    const px = smoothPoints[i].x, py = smoothPoints[i].y;
    const vi = i * 2;
    posArr[(vi) * 3]     = px + nx * width;
    posArr[(vi) * 3 + 1] = py + ny * width;
    posArr[(vi) * 3 + 2] = 0.5;
    posArr[(vi + 1) * 3]     = px - nx * width;
    posArr[(vi + 1) * 3 + 1] = py - ny * width;
    posArr[(vi + 1) * 3 + 2] = 0.5;

    _trailTmpColor.copy(_trailTipColor).lerp(_trailBaseColor, t);
    colArr[(vi) * 4]     = _trailTmpColor.r;
    colArr[(vi) * 4 + 1] = _trailTmpColor.g;
    colArr[(vi) * 4 + 2] = _trailTmpColor.b;
    colArr[(vi) * 4 + 3] = t;
    colArr[(vi + 1) * 4]     = _trailTmpColor.r;
    colArr[(vi + 1) * 4 + 1] = _trailTmpColor.g;
    colArr[(vi + 1) * 4 + 2] = _trailTmpColor.b;
    colArr[(vi + 1) * 4 + 3] = t;
  }

  trailPosAttr.needsUpdate = true;
  trailColAttr.needsUpdate = true;
  const vertCount = smoothLen * 2;
  const indexCount = (vertCount - 2) * 3;
  trailGeo.setDrawRange(0, indexCount);
}

// 軌跡と敵の衝突判定（線分ごと）
function checkTrailEnemyCollision() {
  if (trailHistory.length < 2) return;

  const trailCollDist = TRAIL_BASE_WIDTH * speedMult * 0.5 + ENEMY_RADIUS;
  const trailCollDistSq = trailCollDist * trailCollDist;

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const ex = e.position.x, ey = e.position.y;

    for (let j = 0; j < trailHistory.length - 1; j++) {
      const a = trailHistory[j];
      const b = trailHistory[j + 1];

      const abx = b.x - a.x, aby = b.y - a.y;
      const aex = ex - a.x, aey = ey - a.y;
      const abLenSq = abx * abx + aby * aby;
      if (abLenSq < 0.01) continue;
      let t = (aex * abx + aey * aby) / abLenSq;
      t = Math.max(0, Math.min(1, t));
      const cx = a.x + abx * t;
      const cy = a.y + aby * t;
      const dx = ex - cx, dy = ey - cy;

      if (dx * dx + dy * dy < trailCollDistSq) {
        killEnemy(i, false);
        break;
      }
    }
  }
}

// ============================================================
// 消滅パーティクル（美しい装飾、衝突なし）— ジオメトリ共有
// ============================================================
const particles = [];
const particleGeoShared = new THREE.CircleGeometry(1.5, 8);

function spawnParticles(x, y, color) {
  const baseHsl = {};
  new THREE.Color(color).getHSL(baseHsl);
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const hue = (baseHsl.h + (Math.random() - 0.5) * 0.15 + 1) % 1;
    const c = new THREE.Color().setHSL(hue, 0.9, 0.7);
    const mat = new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 1.0 });
    const mesh = new THREE.Mesh(particleGeoShared, mat);
    mesh.position.set(x, y, 3);
    scene.add(mesh);
    const angle = (Math.PI * 2 * i) / PARTICLE_COUNT + Math.random() * 0.5;
    const speed = 80 + Math.random() * 150;
    particles.push({
      mesh,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: PARTICLE_LIFE
    });
  }
}

// ============================================================
// 敵の破片（衝突あり、連鎖分裂）
// ============================================================
const fragments = [];
const fragmentGeoShared = new THREE.CircleGeometry(FRAGMENT_RADIUS, 10);

function spawnFragments(x, y, color) {
  const baseHsl = {};
  new THREE.Color(color).getHSL(baseHsl);
  for (let i = 0; i < FRAGMENT_COUNT; i++) {
    const hue = (baseHsl.h + (i * 0.08)) % 1;
    const c = new THREE.Color().setHSL(hue, 0.85, 0.55);
    const mat = new THREE.MeshBasicMaterial({ color: c });
    const mesh = new THREE.Mesh(fragmentGeoShared, mat);
    mesh.position.set(x, y, 1.5);
    scene.add(mesh);
    const angle = (Math.PI * 2 * i) / FRAGMENT_COUNT + Math.random() * 0.4;
    const speed = FRAGMENT_SPEED * (0.8 + Math.random() * 0.4);
    fragments.push({
      mesh,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: c.getHex()
    });
  }
}

// ============================================================
// 入力
// ============================================================
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function getGamepadInput() {
  const gp = navigator.getGamepads ? navigator.getGamepads() : [];
  for (const pad of gp) {
    if (!pad) continue;
    const deadzone = 0.15;
    let axisX = pad.axes[0] || 0;
    if (Math.abs(axisX) < deadzone) axisX = 0;

    const jumpBtn = pad.buttons[0]?.pressed || false;
    const dashBtn = pad.buttons[1]?.pressed || pad.buttons[2]?.pressed || pad.buttons[5]?.pressed || false;

    const dpadLeft  = pad.buttons[14]?.pressed || false;
    const dpadRight = pad.buttons[15]?.pressed || false;

    if (dpadLeft)  axisX = -1;
    if (dpadRight) axisX =  1;

    return { axisX, jump: jumpBtn, dash: dashBtn };
  }
  return null;
}

function getInput() {
  let axisX = 0;
  let jump = false;
  let dash = false;

  if (keys['ArrowLeft']  || keys['KeyA']) axisX -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) axisX += 1;
  if (keys['Space'] || keys['ArrowUp'] || keys['KeyW']) jump = true;
  if (keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyZ']) dash = true;

  const gp = getGamepadInput();
  if (gp) {
    if (gp.axisX !== 0) axisX = gp.axisX;
    if (gp.jump) jump = true;
    if (gp.dash) dash = true;
  }

  return { axisX, jump, dash };
}

// ============================================================
// HUD
// ============================================================
const enemyCountEl = document.getElementById('enemy-count');
const comboCountEl = document.getElementById('combo-count');
const speedDisplayEl = document.getElementById('speed-display');
const scoreEl = document.getElementById('score');
const messageEl = document.getElementById('message');

function updateHud() {
  enemyCountEl.textContent = enemies.length;
  comboCountEl.textContent = combo;
  scoreEl.textContent = score;
  speedDisplayEl.textContent = 'x' + speedMult.toFixed(1);
}

function addScore(pts) {
  score += pts;
  updateHud();
}

// ============================================================
// ゲーム状態
// ============================================================
let gameCleared = false;

function resetGame() {
  player.position.set(0, 0, 1);
  vx = 0;
  vy = 0;
  combo = 0;
  lastLandTime = -999;
  isDashing = false;
  score = 0;
  speedMult = 1.0;
  gameCleared = false;
  messageEl.style.display = 'none';

  for (const e of enemies) scene.remove(e);
  for (const ed of enemyData) {
    if (ed.trailLine) { scene.remove(ed.trailLine); ed.trailLine.geometry.dispose(); ed.trailLine.material.dispose(); }
  }
  enemies.length = 0;
  enemyData.length = 0;

  for (const p of particles) scene.remove(p.mesh);
  particles.length = 0;
  for (const f of fragments) scene.remove(f.mesh);
  fragments.length = 0;

  trailHistory.length = 0;
  trailGeo.setDrawRange(0, 0);

  spawnEnemies();
}

// ============================================================
// 敵撃破処理
// ============================================================
function killEnemy(index, byPlayer) {
  const e = enemies[index];
  const ex = e.position.x, ey = e.position.y;
  const color = e.material.color.getHex();

  addScore(SCORE_PER_ENEMY);

  // スピードアップ
  speedMult = Math.min(speedMult + SPEED_BOOST_PER_KILL, MAX_SPEED_MULT);
  updateHud();

  // パーティクル演出（常に出る）
  spawnParticles(ex, ey, color);

  // ボール本体がぶつかった場合は分裂破片を飛ばす
  if (byPlayer) {
    spawnFragments(ex, ey, color);
  }

  scene.remove(e);
  const ed = enemyData[index];
  if (ed.trailLine) { scene.remove(ed.trailLine); ed.trailLine.geometry.dispose(); ed.trailLine.material.dispose(); ed.trailLine = null; }
  enemies.splice(index, 1);
  enemyData.splice(index, 1);
}

// ============================================================
// ゲームループ
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (!gameCleared) {
    const input = getInput();
    isDashing = input.dash;

    // スピード倍率は徐々に1.0に戻る
    if (speedMult > 1.0) {
      speedMult = Math.max(1.0, speedMult - SPEED_DECAY_RATE * dt);
    }

    // 水平移動（Bダッシュ + スピード倍率）
    const baseSpeed = isDashing ? DASH_SPEED : MOVE_SPEED;
    vx = input.axisX * baseSpeed * speedMult;

    // ジャンプ（ダッシュ中は大ジャンプ、コンボでさらにアップ）
    if (input.jump && onGround) {
      const now = clock.elapsedTime;
      if (now - lastLandTime < COMBO_WINDOW) {
        combo = Math.min(combo + 1, MAX_COMBO);
      } else {
        combo = 0;
      }
      let jumpV = JUMP_VELOCITY * speedMult;
      if (isDashing) jumpV += DASH_JUMP_BONUS;
      jumpV += combo * COMBO_BONUS;
      vy = jumpV;
      onGround = false;
      updateHud();
    }

    // 重力
    vy += GRAVITY * dt;

    // 位置更新
    player.position.x += vx * dt;
    player.position.y += vy * dt;

    // 壁との衝突 → 減速
    if (player.position.x < innerLeft) {
      player.position.x = innerLeft;
      vx = -vx * BOUNCE_DAMPING;
      speedMult = Math.max(1.0, speedMult - WALL_SPEED_PENALTY);
    } else if (player.position.x > innerRight) {
      player.position.x = innerRight;
      vx = -vx * BOUNCE_DAMPING;
      speedMult = Math.max(1.0, speedMult - WALL_SPEED_PENALTY);
    }

    if (player.position.y < innerBottom) {
      player.position.y = innerBottom;
      if (Math.abs(vy) < MIN_BOUNCE_VEL) {
        vy = 0;
        onGround = true;
      } else {
        vy = -vy * BOUNCE_DAMPING;
        speedMult = Math.max(1.0, speedMult - WALL_SPEED_PENALTY);
      }
    } else if (player.position.y > innerTop) {
      player.position.y = innerTop;
      vy = -vy * BOUNCE_DAMPING;
      speedMult = Math.max(1.0, speedMult - WALL_SPEED_PENALTY);
    }

    if (player.position.y <= innerBottom + 1) {
      if (!onGround) lastLandTime = clock.elapsedTime;
      onGround = true;
    } else {
      onGround = false;
      // 滂空中はスピード加速
      speedMult = Math.min(speedMult + AIRBORNE_ACCEL * dt, MAX_SPEED_MULT);
    }

    // 敵の移動と壁バウンド + 色更新 + 軌跡
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      const ed = enemyData[i];
      e.position.x += ed.vx * dt;
      e.position.y += ed.vy * dt;

      // 壁で跳ね返る（少し反発）
      if (e.position.x < eInnerLeft)  { e.position.x = eInnerLeft;  ed.vx = Math.abs(ed.vx) + ENEMY_WALL_BOUNCE; }
      if (e.position.x > eInnerRight) { e.position.x = eInnerRight; ed.vx = -(Math.abs(ed.vx) + ENEMY_WALL_BOUNCE); }
      if (e.position.y < eInnerBottom){ e.position.y = eInnerBottom; ed.vy = Math.abs(ed.vy) + ENEMY_WALL_BOUNCE; }
      if (e.position.y > eInnerTop)   { e.position.y = eInnerTop;   ed.vy = -(Math.abs(ed.vy) + ENEMY_WALL_BOUNCE); }

      // 敵の色を移動方向で変える
      const eAngle = Math.atan2(ed.vy, ed.vx);
      const eHue = (eAngle / (Math.PI * 2) + 1) % 1;
      e.material.color.setHSL(eHue, 0.8, 0.55);

      // 敵の軌跡更新（座標更新のみ、オブジェクト再生成なし）
      ed.trail.push({ x: e.position.x, y: e.position.y });
      while (ed.trail.length > ENEMY_TRAIL_LENGTH) ed.trail.shift();
      const tLen = ed.trail.length;
      if (tLen >= 2) {
        const arr = ed.trailPosAttr.array;
        for (let ti = 0; ti < tLen; ti++) {
          arr[ti * 3]     = ed.trail[ti].x;
          arr[ti * 3 + 1] = ed.trail[ti].y;
          arr[ti * 3 + 2] = 0.8;
        }
        ed.trailPosAttr.needsUpdate = true;
        ed.trailLine.geometry.setDrawRange(0, tLen);
        ed.trailLine.material.color.copy(e.material.color);
      }
    }

    // プレイヤーの色を移動方向で変える
    const pSpeed = Math.sqrt(vx * vx + vy * vy);
    if (pSpeed > 10) {
      const pAngle = Math.atan2(vy, vx);
      const pHue = (pAngle / (Math.PI * 2) + 1) % 1;
      const brightness = 0.45 + 0.25 * Math.min(speedMult / MAX_SPEED_MULT, 1);
      playerMat.color.setHSL(pHue, 0.9, brightness);
    }

    // 敵への引力（近い敵に少し吸い寄せられる）
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      const gx = e.position.x - player.position.x;
      const gy = e.position.y - player.position.y;
      const gDist = Math.sqrt(gx * gx + gy * gy);
      if (gDist < GRAVITY_PULL_RANGE && gDist > 1) {
        const strength = GRAVITY_PULL * (1 - gDist / GRAVITY_PULL_RANGE);
        vx += (gx / gDist) * strength * dt;
        vy += (gy / gDist) * strength * dt;
      }
    }

    // 軌跡の記録
    trailTimer += dt;
    if (trailTimer >= TRAIL_RECORD_INTERVAL) {
      trailTimer = 0;
      trailHistory.push({ x: player.position.x, y: player.position.y });
      const maxLen = getTrailMaxLen();
      while (trailHistory.length > maxLen) {
        trailHistory.shift();
      }
    }

    // 軌跡メッシュ更新
    buildTrailMesh();

    // 敵との衝突判定（プレイヤー本体）
    const collisionDist = PLAYER_RADIUS + ENEMY_RADIUS;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const dx = player.position.x - e.position.x;
      const dy = player.position.y - e.position.y;
      const distSq = dx * dx + dy * dy;
      if (distSq < collisionDist * collisionDist) {
        // 相対速度を計算（向かい合っていると大きい）
        const ed = enemyData[i];
        const rvx = vx - ed.vx;
        const rvy = vy - ed.vy;
        // 衝突方向の相対速度（プレイヤーから敵への方向）
        const dist = Math.sqrt(distSq) || 1;
        const nx = -dx / dist, ny = -dy / dist;
        const approachSpeed = rvx * nx + rvy * ny;

        if (approachSpeed > RELATIVE_SPEED_KILL) {
          killEnemy(i, true);
        } else {
          // はじくだけ（ノックバック）
          ed.vx = dx / dist * KNOCKBACK_SPEED;
          ed.vy = dy / dist * KNOCKBACK_SPEED;
          vx += -dx / dist * 80;
          vy += -dy / dist * 80;
          e.position.x += dx / dist * 2;
          e.position.y += dy / dist * 2;
        }
      }
    }

    // 軌跡と敵の衝突判定
    checkTrailEnemyCollision();

    // 破片の更新
    const fInnerLeft   = -hw + WALL_THICKNESS + FRAGMENT_RADIUS;
    const fInnerRight  =  hw - WALL_THICKNESS - FRAGMENT_RADIUS;
    const fInnerBottom = -hh + WALL_THICKNESS + FRAGMENT_RADIUS;
    const fInnerTop    =  hh - WALL_THICKNESS - FRAGMENT_RADIUS;
    const fragCollDist = FRAGMENT_RADIUS + ENEMY_RADIUS;

    for (let i = fragments.length - 1; i >= 0; i--) {
      const f = fragments[i];
      f.mesh.position.x += f.vx * dt;
      f.mesh.position.y += f.vy * dt;

      // 壁判定 → 消滅
      const fx = f.mesh.position.x, fy = f.mesh.position.y;
      if (fx < fInnerLeft || fx > fInnerRight || fy < fInnerBottom || fy > fInnerTop) {
        spawnParticles(fx, fy, f.color);
        scene.remove(f.mesh);
        fragments.splice(i, 1);
        continue;
      }

      // 敵との衝突 → 敵を分裂させる
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const ddx = fx - e.position.x;
        const ddy = fy - e.position.y;
        if (ddx * ddx + ddy * ddy < fragCollDist * fragCollDist) {
          // この敵も分裂
          const eColor = e.material.color.getHex();
          addScore(SCORE_PER_ENEMY);
          speedMult = Math.min(speedMult + SPEED_BOOST_PER_KILL, MAX_SPEED_MULT);
          spawnParticles(e.position.x, e.position.y, eColor);
          spawnFragments(e.position.x, e.position.y, eColor);
          scene.remove(e);
          const edj = enemyData[j];
          if (edj.trailLine) { scene.remove(edj.trailLine); edj.trailLine.geometry.dispose(); edj.trailLine.material.dispose(); }
          enemies.splice(j, 1);
          enemyData.splice(j, 1);
          updateHud();
          // 破片も消える
          scene.remove(f.mesh);
          fragments.splice(i, 1);
          break;
        }
      }
    }

    // パーティクル更新
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) {
        scene.remove(p.mesh);
        particles.splice(i, 1);
        continue;
      }
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.y += p.vy * dt;
      p.mesh.material.opacity = p.life / PARTICLE_LIFE;
      p.mesh.scale.setScalar(0.5 + 0.5 * (p.life / PARTICLE_LIFE));
    }

    // クリア判定
    if (enemies.length === 0 && fragments.length === 0) {
      gameCleared = true;
      messageEl.textContent = 'GAME CLEAR!  SCORE: ' + score;
      messageEl.style.display = 'block';
      setTimeout(() => {
        messageEl.textContent = 'GAME CLEAR!  SCORE: ' + score + '\nPress ENTER or START to restart';
        messageEl.style.fontSize = '28px';
        messageEl.style.whiteSpace = 'pre-line';
      }, 1500);
    }
  } else {
    // リスタート待ち
    if (keys['Enter']) {
      resetGame();
    }
    const gpAll = navigator.getGamepads ? navigator.getGamepads() : [];
    for (const pad of gpAll) {
      if (pad && (pad.buttons[9]?.pressed || pad.buttons[0]?.pressed)) {
        resetGame();
        break;
      }
    }
  }

  renderer.render(scene, camera);
}

// ============================================================
// 初期化
// ============================================================
spawnEnemies();

window.addEventListener('gamepadconnected', (e) => {
  document.getElementById('gamepad-prompt').textContent =
    `ゲームパッド接続: ${e.gamepad.id}`;
  setTimeout(() => {
    document.getElementById('gamepad-prompt').style.display = 'none';
  }, 3000);
});

animate();
</script>
</body>
